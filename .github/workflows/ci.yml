name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Type-check, test, build ──────────────────────────────────────────────────
  build:
    name: Check / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── Dependency vulnerability audit ──────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on high/critical CVEs (pnpm uses the npm advisory DB). Do not use
      # `npm audit` here: this repo is pnpm-only (no package-lock.json → ENOLOCK).
      - name: Audit for high/critical vulnerabilities
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ── Static Analysis (SAST) ───────────────────────────────────────────────────
  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      # CodeQL scans TypeScript/JavaScript for common security patterns
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── Migration canary: verify the journal is complete on a fresh DB ───────────
  # Catches journal drift before it reaches prod. A fresh MySQL container is
  # cheaper than discovering the journal is broken during an emergency deploy.
  #
  # Uses MySQL 8.4 to match prod (8.0 differs on CREATE INDEX IF NOT EXISTS support).
  # Uses pnpm db:migrate (scripts/migrate.ts) — not drizzle-kit migrate — because
  # drizzle-kit migrate uses the binary protocol which rejects multi-statement files.
  migrate-canary:
    name: Migration Canary (fresh DB)
    runs-on: ubuntu-latest
    needs: [build]

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: smartpro_canary
          MYSQL_USER: canary
          MYSQL_PASSWORD: canarypass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=rootpass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all migrations on empty DB
        env:
          DATABASE_URL: mysql://canary:canarypass@127.0.0.1:3306/smartpro_canary
        run: pnpm db:migrate

      - name: Verify migration count
        env:
          MYSQL_PWD: canarypass
        run: |
          COUNT=$(mysql -h 127.0.0.1 -u canary smartpro_canary \
            -se "SELECT COUNT(*) FROM __drizzle_migrations;")
          EXPECTED=90
          echo "Migrations applied: $COUNT (expected $EXPECTED)"
          if [ "$COUNT" -ne "$EXPECTED" ]; then
            echo "FAIL: expected $EXPECTED migrations, got $COUNT"
            exit 1
          fi

      - name: Verify journal integrity
        run: node scripts/verify-journal.mjs --post

  # ── Docker image build (smoke test) ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: smartpro-hub:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
